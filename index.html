<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teen Volunteer Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="topbar">
  <div>
    <h1>Teen Volunteer Finder</h1>
    <div class="muted small">Filter NYC + virtual opportunities • favorites save automatically</div>
  </div>

  <div class="topbar-right">
    <div class="muted small">
      Results: <b id="count">0</b>
    </div>

    <div class="menu">
      <button id="menuBtn" class="menu-btn" aria-haspopup="true" aria-expanded="false" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <div id="menuDropdown" class="menu-dropdown" role="menu" aria-hidden="true">
        <a href="about.html" role="menuitem">About Us</a>
        <a href="submit.html" role="menuitem">Submit an Opportunity</a>
        <a href="#" role="menuitem">Blank</a>
        <a href="#" role="menuitem">Blank</a>
        <a href="#" role="menuitem">Blank</a>
      </div>
    </div>
  </div>
</div>
      <div class="muted small">
  Results: <b id="count">0</b>
  <span style="margin-left:12px;"></span>
  <a class="linkbtn" href="about.html">About</a>
</div>
    </div>

    <div class="controls">
      <input id="search" class="input" placeholder="Search: tutoring, animals, NYC, virtual, etc." />

      <select id="borough" class="select">
        <option value="Any">Any location</option>
        <option value="Virtual">Virtual</option>
        <option value="NYC">NYC-wide</option>
        <option value="Manhattan">Manhattan</option>
        <option value="Brooklyn">Brooklyn</option>
        <option value="Queens">Queens</option>
        <option value="Bronx">Bronx</option>
        <option value="Staten Island">Staten Island</option>
      </select>

      <select id="sort" class="select">
        <option value="relevance">Sort: Relevance</option>
        <option value="az">Sort: A → Z</option>
        <option value="minAge">Sort: Minimum age</option>
        <option value="favorites">Sort: Favorites first</option>
      </select>

      <input id="age" class="input" type="number" min="10" max="25" value="14" placeholder="Your age" />

      <button id="virtualOnly" class="btn" aria-pressed="false">Virtual only</button>
      <button id="favoritesOnly" class="btn" aria-pressed="false">Favorites only</button>
    </div>

    <div class="meta-row">
      <div class="muted small">Categories (click to filter):</div>
      <button id="clearCats" class="btn" aria-pressed="false">Clear categories</button>
    </div>

    <div id="categoryChips" class="row"></div>

    <div id="error" class="muted small" style="margin-top:10px;"></div>

    <div id="results" class="grid"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
